<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Panel administrador - Energy Woman</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/img/logo.svg" alt="Energy Woman" style="height:38px; width:38px; border-radius:50%; flex-shrink:0;">
      <div>
        <div class="marca-nombre">ENERGY WOMAN</div>
        <div class="marca-sub">Panel administrador</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-selector-movil">
        <button class="nav-selector-btn activo" data-seccion="socios" onclick="cambiarSeccion('socios')">Socios</button>
        <button class="nav-selector-btn" data-seccion="caja" onclick="cambiarSeccion('caja')">Caja</button>
      </div>

      <div class="nav-seccion activa-movil" data-seccion="socios">
        <div class="nav-seccion-titulo">Socios</div>
        <button data-tab="reportes" class="activo" onclick="cambiarTab('reportes')">Reportes Descuentos</button>
        <button data-tab="historial" onclick="cambiarTab('historial')">Historial Descuentos</button>
        <button data-tab="socios" onclick="cambiarTab('socios')">Socios</button>
        <button data-tab="bomberos" onclick="cambiarTab('bomberos')">Usuarios</button>
        <button data-tab="reglas" onclick="cambiarTab('reglas')">Reglas de descuento</button>
        <button data-tab="precios" onclick="cambiarTab('precios')">Precios</button>
      </div>

      <div class="nav-seccion" data-seccion="caja">
        <div class="nav-seccion-titulo">Caja</div>
        <button data-tab="cuadre-caja" onclick="cambiarTab('cuadre-caja')">Cuadre de caja</button>
        <button data-tab="historial-cuadres" onclick="cambiarTab('historial-cuadres')">Historial de cuadres</button>
        <button data-tab="reportes-cuadres" onclick="cambiarTab('reportes-cuadres')">Reportes de cuadres</button>
        <button data-tab="descargas" onclick="cambiarTab('descargas')">Descargas</button>
      </div>
    </nav>
    <button class="sidebar-logout" onclick="Api.cerrarSesion()">Cerrar sesión</button>
  </aside>

  <div class="contenedor">
    <div id="tab-reportes" class="tab-contenido"></div>
    <div id="tab-historial" class="tab-contenido oculto"></div>
    <div id="tab-socios" class="tab-contenido oculto"></div>
    <div id="tab-bomberos" class="tab-contenido oculto"></div>
    <div id="tab-reglas" class="tab-contenido oculto"></div>
    <div id="tab-precios" class="tab-contenido oculto"></div>
    <div id="tab-cuadre-caja" class="tab-contenido oculto"></div>
    <div id="tab-historial-cuadres" class="tab-contenido oculto"></div>
    <div id="tab-reportes-cuadres" class="tab-contenido oculto"></div>
    <div id="tab-descargas" class="tab-contenido oculto"></div>
  </div>
</div>

<div id="modalContenedor"></div>

<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
